<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="차박지도" />
  <title>차박지도</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    /* tunable */
    /* variable */
    :root {
      --color-bg: #0f1923;
      --color-panel: #162130;
      --color-border: #1e3048;
      --color-accent: #4fc3a1;
      --color-accent2: #f0a500;
      --color-text: #e8edf2;
      --color-muted: #6b8299;
      --font-display: 'Black Han Sans', sans-serif;
      --font-body: 'Noto Sans KR', sans-serif;

      --cat-olle: #4fc3a1;
      --cat-forest: #6db56d;
      --cat-rest: #e07b54;
      --cat-market: #c97ab8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--color-panel);
      border-bottom: 1px solid var(--color-border);
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--color-accent);
      letter-spacing: 1px;
    }

    .logo span {
      color: var(--color-accent2);
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: var(--color-panel);
      border-bottom: 1px solid var(--color-border);
      overflow-x: auto;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
    }

    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      background: var(--color-bg);
      color: var(--color-muted);
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-btn .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .filter-btn.active {
      color: var(--color-text);
      background: var(--color-border);
    }

    .filter-btn[data-cat="오름"].active       { border-color: var(--cat-olle); }
    .filter-btn[data-cat="휴양림"].active     { border-color: var(--cat-forest); }
    .filter-btn[data-cat="휴게소"].active     { border-color: var(--cat-rest); }
    .filter-btn[data-cat="전통시장"].active   { border-color: var(--cat-market); }

    /* MAP */
    #map {
      flex: 1;
      width: 100%;
    }

    /* POPUP */
    .popup-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--color-panel);
      border-top: 2px solid var(--color-border);
      border-radius: 16px 16px 0 0;
      padding: 16px 20px 28px;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      max-height: 55dvh;
      overflow-y: auto;
    }

    .popup-wrap.open {
      transform: translateY(0);
    }

    .popup-handle {
      width: 36px;
      height: 4px;
      background: var(--color-border);
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    .popup-category {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .popup-name {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--color-text);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .popup-desc {
      font-size: 13px;
      color: var(--color-muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .popup-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .popup-tag {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      background: var(--color-bg);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    .popup-tag.yes  { border-color: var(--color-accent); color: var(--color-accent); }
    .popup-tag.no   { border-color: #444; color: #555; }

    .nav-btn {
      display: block;
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--color-accent);
      color: #0f1923;
      font-family: var(--font-display);
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .nav-btn:hover { opacity: 0.85; }

    .popup-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      color: var(--color-muted);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }

    /* LOADING */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 16px;
    }

    #loading .logo-big {
      font-family: var(--font-display);
      font-size: 32px;
      color: var(--color-accent);
    }

    #loading .logo-big span { color: var(--color-accent2); }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div id="loading">
  <div class="logo-big">차박<span>지도</span></div>
  <div class="spinner"></div>
</div>

<header>
  <div class="logo">차박<span>지도</span></div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="오름">
    <span class="dot" style="background:var(--cat-olle)"></span> 제주오름
  </button>
  <button class="filter-btn active" data-cat="휴양림">
    <span class="dot" style="background:var(--cat-forest)"></span> 자연휴양림
  </button>
  <button class="filter-btn active" data-cat="휴게소">
    <span class="dot" style="background:var(--cat-rest)"></span> 고속도로휴게소
  </button>
  <button class="filter-btn active" data-cat="전통시장">
    <span class="dot" style="background:var(--cat-market)"></span> 전통시장
  </button>
</div>

<div id="map"></div>

<div class="popup-wrap" id="popup">
  <div class="popup-handle"></div>
  <button class="popup-close" id="popupClose">×</button>
  <div class="popup-category" id="popupCategory"></div>
  <div class="popup-name" id="popupName"></div>
  <div class="popup-desc" id="popupDesc"></div>
  <div class="popup-tags" id="popupTags"></div>
  <a class="nav-btn" id="navBtn" target="_blank">🧭 카카오맵 길찾기</a>
</div>

<!-- tunable -->
<!-- variable: API 키, CSV 파일 경로 -->
<script>
  const KAKAO_API_KEY = '79e1041f982a19820d7afe8f94aefa5d';

  const CSV_FILES = {
    '오름':     'jeju_oreum.csv',
    '휴양림':   'forest.csv',
    '휴게소':   'rest_area.csv',
    '전통시장': 'market.csv',
  };

  // tunable
  // mapping: 카테고리별 마커 색상
  const CAT_COLOR = {
    '오름':     '#4fc3a1',
    '휴양림':   '#6db56d',
    '휴게소':   '#e07b54',
    '전통시장': '#c97ab8',
  };

  // tunable
  // mapping: 카테고리별 팝업 추가정보 필드 정의
  const CAT_FIELDS = {
    '오름': [],
    '휴양림': [
      { key: 'forest_house', label: '숲속의집' },
      { key: 'heal_house',   label: '치유의집' },
      { key: 'forest_heal',  label: '산림치유' },
      { key: 'glamping',     label: '글램핑' },
      { key: 'deck_site',    label: '데크사이트' },
      { key: 'camp_site',    label: '캠핑사이트' },
    ],
    '휴게소': [
      { key: 'electric_charge', label: '전기충전', yn: true },
      { key: 'sleep',           label: '수면실',   yn: true },
      { key: 'shower',          label: '샤워실',   yn: true },
      { key: 'laundry',         label: '세탁실',   yn: true },
      { key: 'menu',            label: '대표메뉴', yn: false },
    ],
    '전통시장': [
      { key: 'market_open', label: '개설주기', yn: false },
      { key: 'toilet',      label: '화장실',   yn: true },
      { key: 'garage',      label: '주차장',   yn: true },
    ],
  };
</script>

<script>
  // input/output
  // Input example: CSV rows with name, lat, lng, + category fields
  // Output example: kakao map markers with popup & navi link

  let map, activeFilters = new Set(Object.keys(CSV_FILES));
  let allMarkers = {}; // { category: [{marker, data}] }

  function loadKakaoScript() {
    return new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_API_KEY}&autoload=false`;
      s.onload = () => kakao.maps.load(resolve);
      document.head.appendChild(s);
    });
  }

  function makeSVGMarker(color) {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
      <path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="${color}"/>
      <circle cx="14" cy="14" r="6" fill="white"/>
    </svg>`;
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }

  function showPopup(data, cat) {
    const color = CAT_COLOR[cat];
    document.getElementById('popupCategory').textContent = cat;
    document.getElementById('popupCategory').style.color = color;
    document.getElementById('popupName').textContent = data.name;
    document.getElementById('popupDesc').textContent = data.description || '';

    const tagsEl = document.getElementById('popupTags');
    tagsEl.innerHTML = '';
    (CAT_FIELDS[cat] || []).forEach(f => {
      const v = data[f.key];
      if (!v && v !== '0') return;
      const tag = document.createElement('span');
      tag.className = 'popup-tag';
      if (f.yn) {
        const isYes = v === 'Y' || v === 'y' || v === '○';
        tag.classList.add(isYes ? 'yes' : 'no');
        tag.textContent = (isYes ? '✓ ' : '✗ ') + f.label;
      } else {
        tag.textContent = f.label + ': ' + v;
      }
      tagsEl.appendChild(tag);
    });

    const naviUrl = `https://map.kakao.com/link/to/${encodeURIComponent(data.name)},${data.lat},${data.lng}`;
    document.getElementById('navBtn').href = naviUrl;

    document.getElementById('popup').classList.add('open');
  }

  function closePopup() {
    document.getElementById('popup').classList.remove('open');
  }

  async function loadCSV(cat, file) {
    return new Promise((resolve) => {
      Papa.parse(file, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: (r) => resolve({ cat, rows: r.data }),
      });
    });
  }

  function createMarkers(cat, rows) {
    const color = CAT_COLOR[cat];
    const imgSrc = makeSVGMarker(color);
    const size = new kakao.maps.Size(28, 36);
    const image = new kakao.maps.MarkerImage(imgSrc, size);

    return rows.map(row => {
      const lat = parseFloat(row.lat), lng = parseFloat(row.lng);
      if (isNaN(lat) || isNaN(lng)) return null;
      const marker = new kakao.maps.Marker({
        position: new kakao.maps.LatLng(lat, lng),
        map,
        image,
        title: row.name,
      });
      kakao.maps.event.addListener(marker, 'click', () => {
        map.panTo(new kakao.maps.LatLng(lat, lng));
        showPopup(row, cat);
      });
      return { marker, data: row };
    }).filter(Boolean);
  }

  function applyFilters() {
    Object.entries(allMarkers).forEach(([cat, items]) => {
      const visible = activeFilters.has(cat);
      items.forEach(({ marker }) => marker.setMap(visible ? map : null));
    });
  }

  async function init() {
    await loadKakaoScript();

    map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(36.5, 127.8),
      level: 13,
    });

    const results = await Promise.all(
      Object.entries(CSV_FILES).map(([cat, file]) => loadCSV(cat, file))
    );

    results.forEach(({ cat, rows }) => {
      allMarkers[cat] = createMarkers(cat, rows);
    });

    document.getElementById('loading').style.display = 'none';

    // 지도 클릭 시 팝업 닫기
    kakao.maps.event.addListener(map, 'click', closePopup);
  }

  // 필터 버튼
  document.getElementById('filterBar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const cat = btn.dataset.cat;
    if (activeFilters.has(cat)) {
      activeFilters.delete(cat);
      btn.classList.remove('active');
    } else {
      activeFilters.add(cat);
      btn.classList.add('active');
    }
    applyFilters();
  });

  document.getElementById('popupClose').addEventListener('click', closePopup);

  init();
</script>
</body>
</html>
