<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR코드 생성기</title>
    <script src="../library/qrcode.min.js"></script>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        input { padding: 15px; width: 300px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 15px 25px; font-size: 16px; background: #2e86de; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        #qrcode { margin-top: 30px; display: flex; justify-content: center; padding: 20px; background: white; width: 200px; height: 200px; margin: 0 auto; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); align-items: center; }
    </style>
</head>
<body>
    <h1>📱 QR Code Generator</h1>
    <div>
        <input type="text" id="text" placeholder="예: https://google.com" onkeypress="if(event.keyCode==13) makeQR()">
        <button onclick="makeQR()">생성</button>
    </div>

    <div id="qrcode"></div>
    <button onclick="downloadQR()" style="margin-top: 20px; background: #27ae60;">💾 PNG 다운로드</button>

    <script>
        function makeQR() {
            const text = document.getElementById("text").value;
            if (!text) return;
            const container = document.getElementById("qrcode");
            container.innerHTML = ""; 
            new QRCode(container, { text: text, width: 180, height: 180, correctLevel : QRCode.CorrectLevel.H });
        }

        function downloadQR() {
            // 핵심 logic: QRCode.js가 생성한 img 태그의 base64 src를 추출하여 다운로드 트리거
            const img = document.querySelector("#qrcode img");
            if(img && img.src) {
                const a = document.createElement("a");
                a.href = img.src;
                a.download = "qrcode.png";
                a.click();
            } else {
                alert("먼저 QR 코드를 생성해주세요.");
            }
        }
    </script>
</body>
</html>
