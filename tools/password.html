<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 안전한 비밀번호 생성기</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; text-align: center; color: #333; }
        
        /* 결과 보여주는 창 */
        #result {
            font-family: 'Courier New', monospace; /* 고정폭 글꼴 (구분 쉬움) */
            font-size: 24px; font-weight: bold; color: #2e86de;
            background: #f1f2f6; padding: 20px; border-radius: 10px; border: 2px dashed #ccc;
            margin-bottom: 20px; word-break: break-all;
        }

        .controls { display: flex; flex-direction: column; gap: 15px; text-align: left; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        label { cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; }
        input[type="checkbox"] { transform: scale(1.5); } /* 체크박스 키우기 */
        
        /* 길이 조절 슬라이더 */
        input[type="range"] { width: 100%; }

        button {
            background-color: #2e86de; color: white; border: none; padding: 15px; 
            font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px;
            font-weight: bold; transition: 0.2s;
        }
        button:hover { background-color: #0984e3; }
        
        .copy-btn { background-color: #555; margin-top: 10px; font-size: 14px; padding: 10px; }
        .copy-btn:hover { background-color: #333; }
    </style>
</head>
<body>

    <h1>🔐 Password Generator</h1>
    <p>내 브라우저에서 직접 만드는 안전한 암호</p>

    <div id="result">생성 버튼을 누르세요</div>
    <button class="copy-btn" onclick="copyToClipboard()">📋 복사하기</button>

    <div class="controls">
        <label>
            <span>길이: <span id="lenVal" style="color:#2e86de; font-weight:bold;">16</span>자</span>
        </label>
        <input type="range" id="length" min="4" max="50" value="16" oninput="document.getElementById('lenVal').innerText = this.value">

        <label><input type="checkbox" id="uppercase" checked> 대문자 포함 (A-Z)</label>
        <label><input type="checkbox" id="lowercase" checked> 소문자 포함 (a-z)</label>
        <label><input type="checkbox" id="numbers" checked> 숫자 포함 (0-9)</label>
        <label><input type="checkbox" id="symbols" checked> 특수문자 포함 (!@#$)</label>
    </div>

    <button onclick="generatePassword()">🔄 비밀번호 생성</button>

    <script>
        const keys = {
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lower: "abcdefghijklmnopqrstuvwxyz",
            number: "0123456789",
            symbol: "!@#$%^&*()_+~`|}{[]:;?><,./-="
        };

        function generatePassword() {
            const length = document.getElementById('length').value;
            const useUpper = document.getElementById('uppercase').checked;
            const useLower = document.getElementById('lowercase').checked;
            const useNum = document.getElementById('numbers').checked;
            const useSym = document.getElementById('symbols').checked;

            let charSet = "";
            if (useUpper) charSet += keys.upper;
            if (useLower) charSet += keys.lower;
            if (useNum) charSet += keys.number;
            if (useSym) charSet += keys.symbol;

            if (charSet === "") {
                alert("적어도 하나의 옵션은 선택해야 합니다!");
                return;
            }

            let password = "";
            for (let i = 0; i < length; i++) {
                // 문자셋에서 랜덤하게 하나 뽑기
                const randomIndex = Math.floor(Math.random() * charSet.length);
                password += charSet[randomIndex];
            }

            document.getElementById('result').innerText = password;
        }

        function copyToClipboard() {
            const text = document.getElementById('result').innerText;
            if(text === "생성 버튼을 누르세요") return;
            navigator.clipboard.writeText(text).then(() => {
                alert("복사되었습니다!");
            });
        }

        // 시작하자마자 하나 만들어두기
        generatePassword();
    </script>

</body>
</html>
